services:
  trust_engine:
    build: .
    container_name: trust_engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_FOLDER: /data
      PORT: "3001"
    volumes:
      - trust_engine_data:/data
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: trust_engine_nginx
    restart: unless-stopped
    depends_on:
      - trust_engine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  trust_engine_data: